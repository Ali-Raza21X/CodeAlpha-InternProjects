{% extends "base.html" %}

{% block content %}

<div class="text-center">
    <h2><i class="bi bi-list-ul"></i> All Bookings</h2>
</div>

{% for booking in bookings %}

<div class="booking-item">
    <p><strong>User:</strong> {{ booking.user.username }} <i class="bi bi-person-circle"></i></p>
    <p><strong>Event:</strong> {{ booking.event.title }} <i class="bi bi-calendar-event"></i></p>
    <p><strong>Location:</strong> <i class="bi bi-geo-alt"></i> {{ booking.event.location }}</p>
    <p><strong>Date:</strong> <i class="bi bi-calendar-day"></i> {{ booking.event.date }}</p>
</div>

<hr>

{% endfor %}

{% endblock %}
