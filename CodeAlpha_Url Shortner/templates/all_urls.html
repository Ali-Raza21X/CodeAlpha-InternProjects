<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All URLs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="card shadow">
        <div class="card-body">

            <h2 class="text-center mb-4">All Stored URLs</h2>

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Original URL</th>
                        <th>Short URL</th>
                        <th>Visit</th>
                    </tr>
                </thead>

                <tbody>
                    {% for url in urls %}
                    <tr>
                        <td>{{ url.id }}</td>

                        <td style="max-width:300px;">
                            <small>{{ url.Orignal_url }}</small>
                        </td>

                        <td>
                            <code>{{ request.host_url }}{{ url.short_url }}</code>
                        </td>

                        <td>
                            <a href="{{ request.host_url }}{{ url.short_url }}"
                               class="btn btn-success btn-sm"
                               target="_blank">
                                Open
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

            <div class="text-center mt-4">
                <a href="{{ url_for('index') }}"
                   class="btn btn-primary">
                    Back To Home
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
