<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow p-4" style="width: 600px;">

            <h2 class="text-center mb-4">URL Shortener</h2>

            <form action="/" method="POST">

                <label class="form-label">Enter URL</label>

                <input
                    type="url"
                    name="url_input"
                    class="form-control mb-3"
                    placeholder="https://www.example.com"
                    required
                    pattern="https://.*"
                >

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Create Short URL
                    </button>
                </div>

            </form>

            <div class="mt-3 text-center">
                <a href="{{ url_for('all_urls') }}" class="btn btn-secondary">
                    Display All URLs
                </a>
            </div>
<!-- jinja  2 -->
            {% if message %}
            <div class="alert alert-info mt-4">
                {{ message }}
            </div>
            {% endif %}

            {% if short_url %}
            <div class="alert alert-success mt-3">

                <h5>URL Created Successfully</h5>

                <p>
                    <strong>Original URL:</strong><br>
                    {{ Orignal_url }}
                </p>

                <p>
                    <strong>Short URL:</strong><br>
                    <a href="{{ request.host_url }}{{ short_url }}">
                        {{ request.host_url }}{{ short_url }}
                    </a>
                </p>

            </div>
            {% endif %}

        </div>
    </div>
</body>
